version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./ozzy.db:/app/ozzy.db
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

# Note: Using SQLite (ozzy.db) for simplicity in this template, 
# but could easily add a postgres service.
